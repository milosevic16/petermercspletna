[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # The Web3Forms access key is public-by-design (it ships in the client bundle
  # so the browser can POST to Web3Forms). It's set as a Netlify env var, not
  # committed; this tells Netlify's secret scanner it's intentionally public so
  # it doesn't flag it and block the deploy. If the smart detector still flags a
  # UUID, add SECRETS_SCAN_ENABLED = "false".
  SECRETS_SCAN_OMIT_KEYS = "VITE_WEB3FORMS_KEY"

# SPA rewrite: every path serves index.html so client-side routes and deep links
# resolve (status 200 = rewrite, not redirect). Without this, /contact 404s on reload.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Vite fingerprints asset filenames, and fonts/images are content-addressed
# (<sha8>.<ext>) → cache them forever; never cache the HTML shell.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
